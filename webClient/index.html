<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/goodboy_256.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>client</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            #scene-container {
                position: relative;
                width: 100vw;
                height: 100vh;
            }

            #scene-container canvas {
                display: block;
                width: 100% !important;
                height: 100% !important;
            }

            /* UI overlay on top of canvas */
            #ui {
                position: absolute;
                top: 24px;
                left: 24px;
                z-index: 10;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            #ui h2 {
                color: white;
                font-family: sans-serif;
            }

            #ui button {
                padding: 6px 14px;
                cursor: pointer;
            }

            #status {
                color: gray;
                font-family: sans-serif;
            }

            #output {
                width: 300px;
                resize: none;
                background: rgba(0, 0, 0, 0.5);
                color: white;
                border: 1px solid #555;
                padding: 8px;
                font-family: sans-serif;
            }
        </style>
    </head>
    <body>
        <div id="scene-container">
            <!-- Three.js canvas goes here via JS -->

            <div id="ui">
                <h2>Voice to Text</h2>
                <div>
                    <button id="startBtn">🎙 Start</button>
                    <button id="stopBtn" disabled>⏹ Stop</button>
                </div>
                <p id="status">Idle</p>
                <textarea id="output" rows="6" readonly></textarea>
            </div>
        </div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
